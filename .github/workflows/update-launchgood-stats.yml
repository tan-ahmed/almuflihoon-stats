name: Update LaunchGood campaign stats

permissions:
  contents: write

on:
  schedule:
    # Run once a day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual run from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Install dependencies
        run: npm install

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Fetch LaunchGood stats
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROME_PATH }}
        run: node scripts/fetch-launchgood-stats.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/launchgood-stats.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update LaunchGood campaign stats"
            git push
          fi
